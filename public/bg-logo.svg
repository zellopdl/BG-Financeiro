<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">BG - Borda da Grota</title>
  <desc id="desc">Emblema dourado e bronze com as letras BG.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1b14"/>
      <stop offset="55%" stop-color="#4b2f1f"/>
      <stop offset="100%" stop-color="#1f120d"/>
    </linearGradient>
    <linearGradient id="ringGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9e7a9"/>
      <stop offset="35%" stop-color="#d7b35d"/>
      <stop offset="68%" stop-color="#b9872b"/>
      <stop offset="100%" stop-color="#f3d47a"/>
    </linearGradient>
    <linearGradient id="ringBronze" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c58a50"/>
      <stop offset="45%" stop-color="#9f5f30"/>
      <stop offset="100%" stop-color="#6d3d1f"/>
    </linearGradient>
    <linearGradient id="letterGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1bf"/>
      <stop offset="38%" stop-color="#e0bc68"/>
      <stop offset="75%" stop-color="#ba8a2f"/>
      <stop offset="100%" stop-color="#8d611f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#140d09" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="192" fill="none" stroke="url(#ringBronze)" stroke-width="24"/>
    <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ringGold)" stroke-width="14"/>
    <circle cx="256" cy="256" r="145" fill="none" stroke="#f1d58a" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <g fill="url(#letterGold)">
    <path d="M158 169h105c47 0 77 27 77 68 0 20-8 37-22 48 23 11 36 31 36 58 0 50-38 79-92 79H158V169zm92 96c21 0 34-10 34-27 0-16-12-26-33-26h-38v53h37zm8 113c25 0 40-12 40-32s-15-32-40-32h-45v64h45z"/>
    <path d="M369 292h-86v-44h134v35c0 84-52 143-133 143-88 0-145-60-145-130 0-72 57-131 144-131 51 0 93 22 118 62l-40 26c-17-27-41-40-77-40-52 0-88 37-88 83 0 45 35 82 88 82 42 0 70-24 85-66z"/>
  </g>

  <text x="256" y="455" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#f0cf81" letter-spacing="3">BORDA DA GROTA</text>
</svg>
